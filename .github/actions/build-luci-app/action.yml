name: "Build OpenWrt LuCI App"
description: "Composite Action: compile LuCI package into .ipk/.apk and upload artifacts"
inputs:
  package:
    description: "LuCI package directory name (e.g. luci-app-tailscale)"
    required: true
  sdk-url:
    description: "Legacy OpenWrt SDK .tar.bz2 URL"
    required: true
  snapsdk-url:
    description: "Snapshot OpenWrt SDK .tar.zst URL"
    required: true

outputs:
  version:
    description: "Package version extracted from Makefile"
    value: ${{ steps.get_version.outputs.version }}

runs:
  using: "composite"
  steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Get version from Makefile
      id: get_version
      shell: bash
      run: |
        version=$(grep 'PKG_VERSION:=' Makefile \
                  | awk -F ':=' '{print $2}' \
                  | xargs)
        echo "version=${version}" >> $GITHUB_OUTPUT
        echo "Current Makefile Version: ${version}"

    - name: Install system dependencies & po2lmo
      shell: bash
      run: |
        sudo apt-get update
        sudo DEBIAN_FRONTEND=noninteractive \
          apt-get install -y curl git tar zstd python3-pip
        pip3 install --upgrade pip
        pip3 install po2lmo

    - name: Download Legacy OpenWrt SDK
      shell: bash
      run: |
        mkdir -p /tmp/SDK
        curl -SLk --connect-timeout 30 --retry 2 \
          "${{ inputs['sdk-url'] }}" \
          -o /tmp/SDK.tar.bz2
        tar xjf /tmp/SDK.tar.bz2 \
            --strip-components=1 -C /tmp/SDK

    - name: Download Snapshot OpenWrt SDK
      shell: bash
      run: |
        mkdir -p /tmp/SNAPSDK
        curl -SLk --connect-timeout 30 --retry 2 \
          "${{ inputs['snapsdk-url'] }}" \
          -o /tmp/SNAPSDK.tar.zst
        zstd -d /tmp/SNAPSDK.tar.zst
        tar xf /tmp/SNAPSDK.tar \
            --strip-components=1 -C /tmp/SNAPSDK

    - name: Copy source into SDKs
      shell: bash
      run: |
        mkdir -p /tmp/SDK/package/${{ inputs.package }}
        mkdir -p /tmp/SNAPSDK/package/${{ inputs.package }}
        rsync -avh --exclude='.git' . \
          /tmp/SDK/package/${{ inputs.package }}
        rsync -avh --exclude='.git' . \
          /tmp/SNAPSDK/package/${{ inputs.package }}

    - name: Compile IPK with Legacy SDK
      shell: bash
      run: |
        cd /tmp/SDK
        ./scripts/feeds update -a
        ./scripts/feeds install ${{ inputs.package }}
        echo "CONFIG_PACKAGE_${{ inputs.package }}=y" > .config
        make defconfig
        make package/${{ inputs.package }}/compile V=99

    - name: Compile APK with Snapshot SDK
      shell: bash
      run: |
        cd /tmp/SNAPSDK
        ./scripts/feeds update -a
        ./scripts/feeds install ${{ inputs.package }}
        echo "CONFIG_PACKAGE_${{ inputs.package }}=y" > .config
        make defconfig
        make package/${{ inputs.package }}/compile V=99

    - name: Collect artifacts
      shell: bash
      run: |
        mkdir -p artifacts
        # Copy IPK from legacy SDK
        cp /tmp/SDK/bin/ar71xx/packages/base/luci-*_all.ipk "./artifacts/"

        # Copy APK from SNAPSHOT SDK
        cp /tmp/SNAPSDK/bin/packages/x86_64/base/luci-*.apk "./artifacts/"
        echo "v${{ steps.get_version.outputs.version }}" \
          > artifacts/version.txt

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: LuCI-Package-${{ steps.get_version.outputs.version }}
        path: artifacts
